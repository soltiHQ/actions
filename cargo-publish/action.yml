name: Cargo publish
description: >-
  Publish one or more Rust crates to crates.io, in the given order.
  Soft-exit on 'already exists' and retry on HTTP 429.

inputs:
  crates:
    description: |
      Crate names to publish, in dependency order (one per line, or whitespace-separated).
      Single crate is allowed.
    required: true
  token:
    description: crates.io registry token (secrets.CRATES_IO_TOKEN or equivalent).
    required: true
  all-features:
    description: Pass '--all-features' to cargo publish.
    required: false
    default: "true"
  max-attempts:
    description: Maximum attempts on HTTP 429 (per crate).
    required: false
    default: "5"
  backoff-seconds:
    description: Sleep between retries on HTTP 429 (crates.io new-crates window is ~10 min).
    required: false
    default: "600"

runs:
  using: composite
  steps:
    - shell: bash
      env:
        CRATES: ${{ inputs.crates }}
        CARGO_REGISTRY_TOKEN: ${{ inputs.token }}
        ALL_FEATURES: ${{ inputs.all-features }}
        MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        BACKOFF_SECONDS: ${{ inputs.backoff-seconds }}
      run: |
        set -uo pipefail

        base_args=(publish)
        if [ "$ALL_FEATURES" = "true" ]; then
          base_args+=(--all-features)
        fi

        publish_one() {
          local crate=$1
          local attempt=0
          while : ; do
            attempt=$((attempt + 1))
            echo "::group::[$crate] attempt $attempt/$MAX_ATTEMPTS: cargo ${base_args[*]} -p $crate"
            out=$(cargo "${base_args[@]}" -p "$crate" 2>&1) && status=0 || status=$?
            printf '%s\n' "$out"
            echo "::endgroup::"

            if [ "$status" -eq 0 ]; then
              echo "[$crate] published successfully"
              return 0
            fi

            if printf '%s' "$out" | grep -qiE 'already (exists|uploaded)|is already uploaded'; then
              echo "[$crate] already published at this version — soft-exit"
              return 0
            fi

            if printf '%s' "$out" | grep -qiE '429 Too Many Requests|published too many|rate[[:space:]]*limit'; then
              if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
                echo "::error::[$crate] rate-limited, exhausted $MAX_ATTEMPTS attempts"
                return 1
              fi
              echo "::warning::[$crate] rate-limited, sleeping ${BACKOFF_SECONDS}s before retry"
              sleep "$BACKOFF_SECONDS"
              continue
            fi

            echo "::error::[$crate] publish failed (exit $status)"
            return "$status"
          done
        }

        for crate in $CRATES; do
          publish_one "$crate" || exit $?
        done
