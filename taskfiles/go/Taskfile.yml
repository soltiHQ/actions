version: '3'

vars:
  git_root:
    sh: git rev-parse --show-toplevel

  # Required: set via includes.vars
  go_version: '{{.go_version}}'

  # Optional: override via includes.vars
  image_ci: '{{.image_ci | default (printf "ghcr.io/soltihq/golang-ci:%s-%s" .go_version .image_ci_patch)}}'
  image_ci_patch: '{{.image_ci_patch | default "1"}}'
  cache_dir: '{{.cache_dir | default ".cache"}}'

tasks:
  default:
    desc: Default task.
    cmds:
      - echo "Please enter a task or use '-l' or '--list-all' to list all available tasks"
    silent: true

  # ================================================#
  # ---------------------INTERNAL-------------------#
  # ================================================#

  _docker/run:
    desc: Internal wrapper to run task in containers.
    internal: true
    silent: true
    requires:
      vars: [ IMAGE, CMD, MOUNT_DIR ]
    dir: "{{.git_root}}"
    cmd: |
      set -euo pipefail

      if ! docker image inspect "{{.IMAGE}}" >/dev/null 2>&1; then
        echo "pulling: {{.IMAGE}}"
        docker pull -q "{{.IMAGE}}" >/dev/null 2>&1 || {
          echo "Failed to pull image: {{.IMAGE}}"
          exit 1
        }
      fi
      docker run --rm --init --pull=never \
        --security-opt no-new-privileges \
        --user $(id -u):$(id -g) \
        --cap-drop=ALL \
        \
        --volume "{{.git_root}}/{{.MOUNT_DIR}}:/workspace:rw" \
        {{if .VOLUMES}}{{range $vol := .VOLUMES}}--volume {{$vol}} {{end}}{{end}} \
        {{if .ENVS}}{{range $env := .ENVS}}--env "{{$env}}" {{end}}{{end}} \
        \
        --workdir /workspace \
        {{.IMAGE}} \
        {{.CMD}}

  _go/tool:
    desc: Internal wrapper for running Go tools.
    internal: true
    silent: true
    requires:
      vars: [ CMD ]
    cmds:
      - cmd: mkdir -p "{{.git_root}}/{{.cache_dir}}"
      - task: _docker/run
        vars:
          IMAGE: "{{.image_ci}}"
          CMD: "{{.CMD}}"
          MOUNT_DIR: "."
          VOLUMES:
            - "{{.git_root}}/{{.cache_dir}}:/tmp/{{.cache_dir}}"
          ENVS:
            - "HOME=/tmp"
            - "GOPATH=/tmp/{{.cache_dir}}/gopath"
            - "GOMODCACHE=/tmp/{{.cache_dir}}/mod"
            - "GOCACHE=/tmp/{{.cache_dir}}/build"

  # ================================================#
  # ----------------------PUBLIC--------------------#
  # ================================================#

  go/test:
    desc: Run Go tests.
    silent: true
    vars:
      TEST_ARGS: '{{.TEST_ARGS | default "./..."}}'
    cmds:
      - task: _go/tool
        vars:
          CMD: "go test {{.TEST_ARGS}}"

  go/lint:
    desc: Run Go linters.
    silent: true
    vars:
      LINT_ARGS: '{{.LINT_ARGS | default "./..."}}'
    cmds:
      - task: _go/tool
        vars:
          CMD: "golangci-lint run {{.LINT_ARGS}}"

  go/fumpt:
    desc: Run Go fumpt formatter.
    silent: true
    cmds:
      - task: _go/tool
        vars:
          CMD: 'gofumpt -l -w $(git ls-files "*.go")'

  go/vulnerability:
    desc: Run vulnerability scanner.
    silent: true
    vars:
      VULN_ARGS: '{{.VULN_ARGS | default "./..."}}'
    cmds:
      - task: _go/tool
        vars:
          CMD: "govulncheck {{.VULN_ARGS}}"

  go/mod/tidy:
    desc: Run 'go mod tidy'.
    silent: true
    cmds:
      - task: _go/tool
        vars:
          CMD: "go mod tidy"
