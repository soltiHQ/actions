version: '3'

vars:
  git_root:
    sh: git rev-parse --show-toplevel

  # Required: set via includes.vars
  rust_version: '{{.rust_version}}'

  # Optional: override via includes.vars
  cache_dir: '{{.cache_dir | default ".cache"}}'
  image_patch: '{{.image_patch | default "-1"}}'

tasks:
  default:
    desc: Default task.
    cmds:
      - echo "Please enter a task or use '-l' or '--list-all' to list all available tasks"
    silent: true

  # ================================================#
  # ---------------------INTERNAL-------------------#
  # ================================================#

  _docker/run:
    desc: Internal wrapper to run task in containers.
    internal: true
    silent: true
    requires:
      vars: [ IMAGE, CMD, MOUNT_DIR ]
    dir: "{{.git_root}}"
    cmd: |
      set -euo pipefail

      if ! docker image inspect "{{.IMAGE}}" >/dev/null 2>&1; then
        echo "pulling: {{.IMAGE}}"
        docker pull -q "{{.IMAGE}}" >/dev/null 2>&1 || {
          echo "Failed to pull image: {{.IMAGE}}"
          exit 1
        }
      fi
      docker run --rm --init --pull=never \
        --security-opt no-new-privileges \
        --user $(id -u):$(id -g) \
        --cap-drop=ALL \
        \
        --volume "{{.git_root}}/{{.MOUNT_DIR}}:/workspace:rw" \
        {{if .VOLUMES}}{{range $vol := .VOLUMES}}--volume {{$vol}} {{end}}{{end}} \
        {{if .ENVS}}{{range $env := .ENVS}}--env "{{$env}}" {{end}}{{end}} \
        \
        --workdir /workspace \
        {{.IMAGE}} \
        {{.CMD}}

  _cargo/tool:
    internal: true
    silent: true
    requires:
      vars: [ CMD ]
    vars:
      _root:
        sh: git rev-parse --show-toplevel
    cmds:
      - cmd: mkdir -p "{{._root}}/{{.cache_dir}}"
      - task: _docker/run
        vars:
          IMAGE: "ghcr.io/soltihq/rust-ci:{{.rust_version}}{{.image_patch}}"
          CMD: "{{.CMD}}"
          MOUNT_DIR: "."
          VOLUMES:
            - "{{._root}}/{{.cache_dir}}:/tmp/{{.cache_dir}}"
          ENVS:
            - "CARGO_TARGET_DIR=/tmp/{{.cache_dir}}/target"
            - "CARGO_HOME=/tmp/{{.cache_dir}}/cargo"
            - "RUSTUP_TOOLCHAIN={{.rust_version}}"
            - "RUSTUP_NO_UPDATE_CHECK=1"
            - "CARGO_INCREMENTAL=0"
            - "RUSTFLAGS=-D warnings"

  # ================================================#
  # ----------------------PUBLIC--------------------#
  # ================================================#

  cargo/fmt:
    desc: Run 'cargo fmt'.
    silent: true
    vars:
      FMT_ARGS: '{{.FMT_ARGS | default "--check --verbose"}}'
    cmds:
      - task: _cargo/tool
        vars:
          CMD: "fmt {{.FMT_ARGS}}"

  cargo/check:
    desc: Run 'cargo check'.
    silent: true
    vars:
      CHECK_ARGS: '{{.CHECK_ARGS | default ""}}'
    cmds:
      - task: _cargo/tool
        vars:
          CMD: "check {{.CHECK_ARGS}}"

  cargo/clippy:
    desc: Run 'cargo clippy'.
    silent: true
    vars:
      CLIPPY_ARGS: '{{.CLIPPY_ARGS | default "--all --all-features -- -D warnings"}}'
    cmds:
      - task: _cargo/tool
        vars:
          CMD: "clippy {{.CLIPPY_ARGS}}"

  cargo/test:
    desc: Run 'cargo test'.
    silent: true
    vars:
      TEST_ARGS: '{{.TEST_ARGS | default "--all --all-features"}}'
    cmds:
      - task: _cargo/tool
        vars:
          CMD: "test {{.TEST_ARGS}}"

  cargo/audit:
    desc: Run 'audit'.
    silent: true
    cmds:
      - task: _cargo/tool
        vars:
          CMD: "audit"

  # ================================================#
  # ----------------------MANUAL--------------------#
  # ================================================#

  cargo/audit/fix:
    desc: Run 'audit' with auto fix.
    silent: true
    cmds:
      - task: _cargo/tool
        vars:
          CMD: "audit fix"
